<svg width="900" height="450" viewBox="0 0 900 450" xmlns="http://www.w3.org/2000/svg">

<style>
.axis { stroke:#333; stroke-width:1; }
.grid { stroke:#ccc; stroke-dasharray:3 3; }
.label { font-family:Arial, sans-serif; font-size:12px; fill:#999; }
.title { font-family:Arial, sans-serif; font-size:18px; font-weight:bold; fill:#888; }
.legend { font-family:Arial, sans-serif; font-size:13px; }
</style>

<text x="450" y="30" text-anchor="middle" class="title">
Contraintes physiques des sources d’énergie
</text>

<!-- grid -->
<line x1="60" y1="380" x2="840" y2="380" class="axis"/>

<!-- vertical grid -->
<g class="grid">
<line x1="60" y1="100" x2="840" y2="100"/>
<line x1="60" y1="200" x2="840" y2="200"/>
<line x1="60" y1="300" x2="840" y2="300"/>
</g>

<!-- labels energy -->
<g class="label">
<text x="60" y="400">Biomasse</text>
<text x="140" y="400">Éolien terr.</text>
<text x="226" y="400">Éolien offshore</text>
<text x="330" y="400">Solaire PV</text>
<text x="427" y="400">Nucléaire</text>
<text x="535" y="400">Gaz</text>
<text x="620" y="400">Pétrole</text>
<text x="700" y="400">Charbon</text>
</g>

<!-- territoire -->
<polyline fill="none" stroke="green" stroke-width="3"
points="
80,20
170,284
260,372
350,364
450,380
550,378
640,379
740,379
"/>

<!-- CO2 -->
<polyline fill="none" stroke="red" stroke-width="3"
points="
80,315
170,370
260,365
350,355
450,375
550,210
640,253
740,0
"/>

<!-- matériaux -->
<polyline fill="none" stroke="blue" stroke-width="3"
points="
80,350
170,210
260,100
350,140
450,372
550,372
640,372
740,369
"/>

<!-- legend -->
<rect x="700" y="13" width="120" height="70" fill="grey" stroke="#333"/>
<circle cx="720" cy="30" r="5" fill="green"/>
<text x="740" y="35" class="legend">Territoire</text>

<circle cx="720" cy="50" r="5" fill="red"/>
<text x="740" y="55" class="legend">CO₂</text>

<circle cx="720" cy="70" r="5" fill="blue"/>
<text x="740" y="75" class="legend">Matériaux</text>

</svg>